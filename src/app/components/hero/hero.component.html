<section class="hero">
  <div class="hero-bg">
    <div class="grid-overlay"></div>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
  </div>

  <div class="hero-content">
    <p class="hero-greeting">Hi, my name is</p>
    <h1 class="hero-name">Sunil Bijalwan<span class="name-dot">.</span></h1>
    <h2 class="hero-role">
      <span class="terminal-prompt">&#x276F;&nbsp;</span>
      <span class="typed-text">{{displayedText}}</span>
      <span class="cursor" [class.blink]="cursorVisible">|</span>
    </h2>
    <p class="hero-desc">
      8+ years crafting scalable full-stack systems — from real-time WebSocket
      platforms handling <strong>15k+ concurrent users</strong> to banking-grade
      APIs at Emirates NBD. Based in Dubai.
    </p>
    <div class="hero-cta">
      <a href="#experience" class="btn-primary">View My Work</a>
      <a href="#contact" class="btn-ghost">Get In Touch</a>
    </div>
    <div class="hero-stats">
      <div class="stat"><span class="stat-num">8+</span><span class="stat-label">Years Exp</span></div>
      <div class="stat-divider"></div>
      <div class="stat"><span class="stat-num">15k+</span><span class="stat-label">Socket Users</span></div>
      <div class="stat-divider"></div>
      <div class="stat"><span class="stat-num">8+</span><span class="stat-label">Domains</span></div>
    </div>
  </div>

  <div class="scroll-hint">
    <span>scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>
